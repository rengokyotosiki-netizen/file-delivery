<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ファイル受信</title>
<style>
body{font-family:sans-serif;max-width:500px;margin:30px auto;padding:20px;background:#f5f5f5;}
h1{color:#333;text-align:center;font-size:22px;}
.box{background:white;border-radius:10px;padding:20px;text-align:center;margin-bottom:15px;font-size:16px;color:#555;}
.dl-btn{display:block;width:100%;padding:15px;background:#34a853;color:white;border:none;border-radius:10px;font-size:18px;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:15px;box-sizing:border-box;}
.history{background:white;border-radius:10px;padding:15px;}
.history h2{font-size:16px;color:#333;margin-top:0;}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee;font-size:14px;}
.history-item:last-child{border-bottom:none;}
.history-dl-btn{background:#4285f4;color:white;border:none;border-radius:5px;padding:6px 12px;cursor:pointer;font-size:13px;text-decoration:none;}
#notif-status{text-align:center;font-size:13px;color:#555;margin-bottom:10px;background:white;border-radius:8px;padding:10px;}
#debug-box{background:#fff3cd;border-radius:8px;padding:12px;font-size:12px;color:#555;word-break:break-all;display:none;margin-bottom:10px;}
</style>
</head>
<body>
<h1>📥 ファイル受信</h1>
<div class="box" id="statusBox">初期化中...</div>
<div id="notif-status">確認中...</div>
<div id="debug-box"></div>
<div id="latestDl" style="display:none;">
  <a class="dl-btn" id="dlBtn" href="#" target="_blank">⬇️ 最新ファイルをダウンロード</a>
</div>
<div class="history" id="historyBox" style="display:none;">
  <h2>📋 過去の配信履歴</h2>
  <div id="historyList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwLKeq6r4YAte7jfyZto03VMXTh6gxW2ik8-B_ByFnn84jLQvOacvOW16sWqqLVgT3S/exec';
const VAPID_KEY = 'BMSoLyMzJDR-UF6ezY-esqyavJ7oYpSlK3BSh2Z1fdSE-AGo2VUd5EDM5TjRfyG_Djit1sqTxKq5g7movM3BKac';

function debug(msg) {
  const box = document.getElementById('debug-box');
  box.style.display = 'block';
  box.innerHTML += msg + '<br>';
}

function setStatus(msg) {
  document.getElementById('notif-status').textContent = msg;
}

async function init() {
  document.getElementById('statusBox').textContent = '待機中... 新しいファイルが届くと通知が来ます';

  // Step 1: Check browser support
  debug('🔍 ブラウザ確認中...');
  if (!('Notification' in window)) {
    setStatus('❌ このブラウザは通知に対応していません');
    debug('❌ Notification API なし');
    return;
  }
  debug('✅ Notification API あり');

  if (!('serviceWorker' in navigator)) {
    setStatus('❌ Service Worker非対応 (ホーム画面に追加してください)');
    debug('❌ Service Worker なし → ホーム画面追加が必要');
    return;
  }
  debug('✅ Service Worker あり');

  // Step 2: Request notification permission
  debug('📋 通知許可をリクエスト中...');
  let permission;
  try {
    permission = await Notification.requestPermission();
  } catch(e) {
    setStatus('❌ 通知許可エラー: ' + e.message);
    debug('❌ requestPermission 例外: ' + e.message);
    return;
  }
  debug('📋 通知許可結果: ' + permission);

  if (permission !== 'granted') {
    setStatus('❌ 通知がオフです → iPadの設定から許可してください');
    return;
  }

  // Step 3: Register service worker
  debug('🔧 Service Worker 登録中...');
  let registration;
  try {
    registration = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    await navigator.serviceWorker.ready;
    debug('✅ Service Worker 登録成功');
  } catch(e) {
    setStatus('❌ Service Worker登録失敗: ' + e.message);
    debug('❌ SW登録エラー: ' + e.message);
    return;
  }

  // Step 4: Initialize Firebase
  debug('🔥 Firebase 初期化中...');
  try {
    firebase.initializeApp({
      apiKey: "AIzaSyA0IauzLxirKSqr4WZ7rCLLE0q_GLUwvjQ",
      authDomain: "kyotoshiki-e9b89.firebaseapp.com",
      projectId: "kyotoshiki-e9b89",
      storageBucket: "kyotoshiki-e9b89.firebasestorage.app",
      messagingSenderId: "147615553608",
      appId: "1:147615553608:web:22f01e6b7cc993a4d0607d"
    });
    debug('✅ Firebase 初期化成功');
  } catch(e) {
    debug('⚠️ Firebase初期化: ' + e.message + ' (既に初期化済みの可能性あり)');
  }

  const messaging = firebase.messaging();

  // Step 5: Get FCM token
  debug('🔑 FCMトークン取得中...');
  let token;
  try {
    token = await messaging.getToken({
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: registration
    });
    debug('✅ トークン取得: ' + token.substring(0, 20) + '...');
  } catch(e) {
    setStatus('❌ トークン取得失敗: ' + e.message);
    debug('❌ getToken エラー: ' + e.message);
    return;
  }

  // Step 6: Register token with GAS
  debug('📡 サーバーにトークン登録中...');
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({action: 'registerToken', token})
    });
    debug('✅ トークン登録完了 (status: ' + res.status + ')');
  } catch(e) {
    debug('⚠️ トークン登録エラー: ' + e.message);
  }

  setStatus('✅ 通知オン');
  debug('🎉 セットアップ完了！');

  // Step 7: Listen for messages
  messaging.onMessage((payload) => {
    debug('📬 メッセージ受信！');
    const url = payload.data && payload.data.download_url;
    if (url) {
      showDownload(url);
      saveHistory(url);
    }
  });
}

function showDownload(url) {
  document.getElementById('statusBox').textContent = '📬 ファイルが届きました！タップしてダウンロード';
  document.getElementById('dlBtn').href = url;
  document.getElementById('latestDl').style.display = 'block';
}

function saveHistory(url) {
  const history = JSON.parse(localStorage.getItem('dlHistory') || '[]');
  const now = new Date().toLocaleString('ja-JP');
  history.unshift({url, date: now});
  localStorage.setItem('dlHistory', JSON.stringify(history.slice(0, 10)));
  renderHistory();
}

function renderHistory() {
  const history = JSON.parse(localStorage.getItem('dlHistory') || '[]');
  if (history.length === 0) return;
  document.getElementById('historyBox').style.display = 'block';
  document.getElementById('historyList').innerHTML = history.map(h =>
    `<div class="history-item"><span>${h.date}</span><a class="history-dl-btn" href="${h.url}" target="_blank">DL</a></div>`
  ).join('');
}

renderHistory();
init();
</script>
</body>
</html>
